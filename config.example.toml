# GitHub configuration
github_owner = "your-github-username"

# Optional: GitHub Personal Access Token for authenticated API requests
# This increases your rate limit from 60 to 5000 requests per hour
# Create token at: https://github.com/settings/tokens
# Required scopes: public_repo (for public repositories)
github_token = "ghp_your_token_here"

# Global installation path for downloaded binaries
global_path = "/usr/local/bin"  # Linux/macOS
# global_path = "D:\\code_softwares\\bin"  # Windows example

# List of applications to manage
[[apps]]
name = "your-app-name"
alias = "app-alias"  # Optional: alternative binary name
version = "v0.1.0"
path = "/custom/path"  # Optional: override global_path for this app
